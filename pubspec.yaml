name: cu_app
description: Modern Group Chat Application.
publish_to: 'none'
build_app_name: CU_App

version: 1.0.82+82

environment:
  sdk: ">=3.5.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  linkable: ^4.0.0
  url_launcher: ^6.2.5
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0
  eva_icons_flutter: ^3.1.0
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_chat_bubble: ^2.0.2
  permission_handler: ^12.0.1
  uuid: ^4.0.0
  flutter_svg: ^2.0.9
  syncfusion_flutter_pdfviewer: ^32.1.22
  flutter_pdfview: ^1.3.2
  flutter_cached_pdfview: ^0.4.2
  socket_io_client: ^3.1.3
  http_parser: ^4.0.2
  intl: ^0.20.2
  open_filex: ^4.5.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  rxdart: ^0.28.0
  dio: ^5.4.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  get_storage: ^2.1.1
  fluttertoast: ^9.0.0
  image_picker: ^1.0.7
  file_picker: ^10.3.8
  cached_network_image: ^3.3.1
  pull_to_refresh: ^2.0.0
  easy_debounce: ^2.0.3
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  collection: ^1.17.2
  overlay_support: ^2.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_mentions: ^2.0.1
  swipe_to: ^1.0.6
  pdf: ^3.10.4
  focused_menu_custom: ^1.2.0
  easy_autocomplete: ^1.6.0
  autocomplete_textfield: ^2.0.1
  get: ^4.6.6
  video_player: ^2.8.2
  chewie: ^1.7.5
  video_thumbnail: ^0.5.6
  path_provider: ^2.1.2
  talker_dio_logger: ^5.1.9
  talker: ^5.1.9
  flutter_chat_ui: ^2.11.1
  connectivity_plus: ^7.0.0
  win32: ^5.0.5
  flutter_webrtc: ^1.3.0
  mediasfu_mediasoup_client: ^0.1.3
  vibration: ^3.1.3
  flutter_local_notifications: ^18.0.1
  flutter_callkit_incoming: ^2.5.2
  wakelock_plus: ^1.3.2
  flutter_blue_plus: ^2.1.0
  audio_session: ^0.2.2
  pip_view: ^0.9.7
  flutter_inapp_notifications: ^1.0.0
  flutter_dotenv: ^6.0.0
  app_links: ^7.0.0
  flutter_linkify: ^6.0.0
  share_plus: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  device_calendar: ^4.3.3
  table_calendar: ^3.2.0
  timezone: ^0.9.0
  flutter_timezone: ^5.0.1
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.10.5
  webview_flutter_wkwebview: ^3.24.2
  no_screenshot: ^1.0.0
  gal: ^2.3.2







flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app-logo.png"
  min_sdk_android: 24
  web:
    generate: true
    image_path: "assets/icons/app-logo.png"
    background_color: "#FFFFFF"
    theme_color: "#5558FF"
  windows:
    generate: true
    image_path: "assets/icons/app-logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/app-logo.png"

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  change_app_package_name: ^1.1.0
  firebase_core_platform_interface: ^6.0.2
  build_runner: ^2.4.0
  hive_generator: ^1.1.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/audio/ringtone.mp3
    - assets/group_call_embeded/

  fonts:
    - family: Poppins-Regular
      fonts:
        - asset: assets/fonts/Poppins-Black.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-ExtraBold.ttf
        - asset: assets/fonts/Poppins-Light.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Thin.ttf
